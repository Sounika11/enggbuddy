<!DOCTYPE html>

<html lang="en">

<head>

```
<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>EnggBuddy AI Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet">

<style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Poppins',sans-serif;
    }

    body{

        background:
        linear-gradient(
            135deg,
            #3d64be,
            #6d8bbe,
            #2e6aec
        );

        min-height:100vh;

        padding:40px;

    }

    .header{

        text-align:center;

        color:white;

        margin-bottom:40px;

    }

    .header h1{
        padding-top: 3px;

        font-size:30px;

        margin-bottom:10px;

    }

    .header p{

        color:#cbd5e1;

        font-size:18px;

    }

    .question-card{

        background:linear-gradient(135deg,#6185b8,#4e67a3);

        max-width:900px;

        margin:25px auto;

        padding:30px;

        border-radius:20px;

        box-shadow:
        0 10px 30px rgba(0,0,0,0.25);

        transition:0.3s;

    }

    .question-card:hover{

        transform:translateY(-5px);

    }

    .question-title{

        color:#0f172a;

        margin-bottom:20px;

        font-size:22px;

    }

    .option{

        display:block;

        padding:14px;

        margin:10px 0;

        border-radius:12px;

        background:#f8fafc;

        cursor:pointer;

        transition:0.3s;

    }

    .option:hover{

        background:#dbeafe;

    }

    input[type="radio"]{

        margin-right:10px;

        transform:scale(1.2);

    }

    .check-btn{

        margin-top:20px;

        background:
        linear-gradient(
            to right,
            #2563eb,
            #4f46e5
        );

        color:white;

        border:none;

        padding:12px 25px;

        border-radius:12px;

        cursor:pointer;

        font-size:15px;

    }

    .result{

        margin-top:15px;

        padding:12px;

        border-radius:10px;

    }

    .submit-section{

        text-align:center;

        margin-top:40px;

    }

    .submit-btn{

        background:
        linear-gradient(
            to right,
            #10b981,
            #059669
        );

        color:white;

        border:none;

        padding:18px 40px;

        border-radius:15px;

        font-size:18px;

        cursor:pointer;

    }

    #score{

        margin-top:25px;

        color:white;

        font-size:32px;

        font-weight:bold;

    }

</style>
```

</head>

<body>

<div class="header">

```
<h1>🎯 {{ topic }} Quiz</h1>

<p>Answer questions and test your knowledge</p>
```

</div>

<form id="quizForm">

{% for q in mcqs %}

{% set q_index = loop.index0 %}

<div class="question-card">

```
<h2 class="question-title">

    Question {{ loop.index }}

</h2>

<p>{{ q.question }}</p>

<br>

{% for option in q.options %}

<label class="option">

    <input
        type="radio"
        name="q{{ q_index }}"
        value="{{ option }}"
    >

    {{ option }}

</label>

{% endfor %}

<input
    type="hidden"
    id="answer{{ q_index }}"
    value="{{ q.answer }}"
>

<input
    type="hidden"
    id="explanation{{ q_index }}"
    value="{{ q.explanation }}"
>

<button
    type="button"
    class="check-btn"
    data-index="{{ q_index }}"
    onclick="checkSingleAnswer(this.dataset.index)"
>

    Check Answer

</button>

<div
    id="result{{ q_index }}"
    class="result"
></div>
```

</div>

{% endfor %}

<div class="submit-section">

```
<button
    type="button"
    class="submit-btn"
    onclick="checkAnswers()"
>

    Submit Quiz

</button>

<h2 id="score"></h2>
```

</div>

</form>

<script>

function checkSingleAnswer(i){

    i = Number(i);

    const selected =
    document.querySelector(
        'input[name="q'+i+'"]:checked'
    );

    if(!selected){

        alert("Please select an answer");

        return;

    }

    const correct =
    document.getElementById(
        "answer"+i
    ).value;

    const explanation =
    document.getElementById(
        "explanation"+i
    ).value;

    const resultDiv =
    document.getElementById(
        "result"+i
    );

    if(selected.value===correct){

        resultDiv.innerHTML=
        "<div style='background:#dcfce7;color:#166534;padding:12px;border-radius:10px;'>✅ Correct</div>";

    }

    else{

        resultDiv.innerHTML=
        "<div style='background:#fee2e2;color:#991b1b;padding:12px;border-radius:10px;'>" +
        "<b>❌ Wrong</b><br><br>" +
        "<b>Correct Answer:</b> " +
        correct +
        "<br><br>" +
        explanation +
        "</div>";

    }

}

function checkAnswers(){

    let score=0;

    const questions=
    Number("{{ mcqs|length }}");

    for(let i=0;i<questions;i++){

        const selected=
        document.querySelector(
            'input[name="q'+i+'"]:checked'
        );

        if(!selected){

            continue;

        }

        const correct=
        document.getElementById(
            "answer"+i
        ).value;

        if(selected.value===correct){

            score++;

        }

    }

    document.getElementById(
        "score"
    ).innerHTML=
    "🏆 Score: "+score+"/"+questions;

}

</script>

</body>

</html>
