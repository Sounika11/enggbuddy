<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>EnggBuddy AI - Resume Analyzer</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        

        body{

            background:linear-gradient(to right,#141e30,#243b55);

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            padding:30px;

        }

        #loader{

    display:none;

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100%;

    background:rgba(15,23,42,0.95);

    z-index:9999;

    justify-content:center;

    align-items:center;

}

.loader-box{

    text-align:center;

    color:white;

}

.spinner{

    width:70px;

    height:70px;

    border:6px solid rgba(255,255,255,0.2);

    border-top:6px solid #38bdf8;

    border-radius:50%;

    animation:spin 1s linear infinite;

    margin:auto;

    margin-bottom:20px;

}

@keyframes spin{

    from{
        transform:rotate(0deg);
    }

    to{
        transform:rotate(360deg);
    }

}

        .main-container{

            width:100%;

            max-width:1100px;

            display:flex;

            gap:50px;

            align-items:center;

            justify-content:center;

        }

        /* LEFT SECTION */

        .left-section{

            flex:1;

            color:white;

        }

        .logo{

            font-size:75px;

            margin-bottom:20px;

        }

        h1{

            font-size:48px;

            margin-bottom:15px;

        }

        .subtitle{

            color:#d6d6d6;

            line-height:1.8;

            margin-bottom:35px;

            font-size:18px;

        }

        .features p{

            margin:18px 0;

            font-size:18px;

        }

        .features i{

            color:#4ade80;

            margin-right:10px;

        }

        /* RIGHT SECTION */

        .right-section{

            width:430px;

            background:white;

            padding:30px;

            border-radius:20px;

            box-shadow:0px 0px 25px rgba(0,0,0,0.3);

        }

        .upload-box{

            border:2px dashed #243b55;

            padding:25px;

            border-radius:15px;

            margin-bottom:20px;

            background:#f8f9ff;

            text-align:center;

            transition:0.3s;

        }

        .upload-box:hover{

            background:#eef3ff;

        }

        .upload-icon{

            font-size:45px;

            color:#243b55;

            margin-bottom:15px;

        }

        .upload-text{

            font-size:24px;

            font-weight:bold;

            color:#243b55;

            margin-bottom:10px;

        }

        .upload-subtext{

            color:gray;

            margin-bottom:20px;

            font-size:14px;

        }

        input[type="file"]{

            width:100%;

            padding:10px;

            border:1px solid #ccc;

            border-radius:8px;

            background:white;

        }

        .btn{

            width:100%;

            padding:15px;

            border:none;

            background:#243b55;

            color:white;

            font-size:17px;

            border-radius:12px;

            cursor:pointer;

            transition:0.3s;

        }

        .btn:hover{

            background:#141e30;

        }

        .footer{

            margin-top:20px;

            text-align:center;

            color:gray;

            font-size:13px;

        }

        /* RESPONSIVE */

        @media(max-width:900px){

            .main-container{

                flex-direction:column;

                text-align:center;

            }

            .left-section{

                margin-bottom:20px;

            }

            .right-section{

                width:100%;

                max-width:430px;

            }

        }

    </style>

</head>

<div id="loader">

    <div class="loader-box">

        <div class="spinner"></div>

        <h2>Analyzing Resume...</h2>

        <p id="loadingText">
            📄 Reading Resume
        </p>

    </div>

</div>

<body>

    <div class="main-container">

        <!-- LEFT SECTION -->

        <div class="left-section">

            <div class="logo">
                <i class="fa-solid fa-robot"></i>
            </div>

            <h1>Resume Analyzer</h1>

            <p class="subtitle">
                AI-Powered Resume Analyzer for
                Placements & Interview Preparation
            </p>

            <div class="features">

                <p>
                    <i class="fa-solid fa-check"></i>
                    ATS Score Analysis
                </p>

                <p>
                    <i class="fa-solid fa-check"></i>
                    AI Skill Evaluation
                </p>

                <p>
                    <i class="fa-solid fa-check"></i>
                    Project Suggestions
                </p>

                <p>
                    <i class="fa-solid fa-check"></i>
                    Career Recommendations
                </p>

            </div>

        </div>

        <!-- RIGHT SECTION -->

        <div class="right-section">

            <form id="resumeForm"
      action="/analyze_resume"
      method="POST"
      enctype="multipart/form-data">

                <div class="upload-box">

                    <div class="upload-icon">
                        <i class="fa-solid fa-file-arrow-up"></i>
                    </div>

                    <div class="upload-text">
                        Upload Your Resume
                    </div>

                    <div class="upload-subtext">
                        PDF format only
                    </div>

                    <input
                        type="file"
                        name="resume"
                        accept=".pdf"
                        required
                    >

                </div>

                <button
                    class="btn"
                    type="submit"
                >
                    Analyze Resume
                </button>

            </form>

            <div class="footer">
                Powered by Gemini AI
            </div>

        </div>

    </div>
<script>

document
.getElementById("resumeForm")
.addEventListener("submit", function(){

    document.getElementById("loader").style.display = "flex";

    const messages = [
        "🔍 Extracting Skills...",
        "📊 Calculating ATS Score...",
        "🤖 Generating AI Insights...",
        "🚀 Preparing Report..."

    ];

    let i = 0;

    setInterval(() => {

        if(i < messages.length){

            document.getElementById(
                "loadingText"
            ).innerText = messages[i];

            i++;

        }

    }, 1500);

});

</script>

</body>

</html>
